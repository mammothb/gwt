name: Release
on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]"
defaults:
  run:
    shell: bash
permissions:
  contents: write
env:
  NAME: ${{ github.event.repository.name }}
  VERSION: ${{ github.ref_name }}
jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - &checkout
        name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # - name: GitHub - Create release
          #   env:
          #     GH_TOKEN: ${{ github.token }}
          #   run: gh release create --draft ${VERSION}
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'mammothb' }}
    permissions:
      contents: write
      id-token: write # Required for OIDC token exchange
    steps:
      - *checkout
      - name: Publish crates
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        with:
          command: release
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}


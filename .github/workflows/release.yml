name: Release
on:
  workflow_dispatch:
  push:
    branches:
      - master
defaults:
  run:
    shell: bash
env:
  NAME: ${{ github.event.repository.name }}
jobs:
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'mammothb' }}
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      pull-requests: write
      contents: write
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run release-plz
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ github.token }}
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'mammothb' }}
    environment: release
    outputs:
      releases_created: ${{ steps.run-release-plz.outputs.releases_created }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
    permissions:
      pull-requests: read
      contents: write
      id-token: write
    steps:
      - *checkout
      - name: Run release-plz
        id: run-release-plz
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Output - Tag name
        id: tag
        env:
          RELEASES: ${{ steps.run-release-plz.outputs.releases }}
        run: |
          release_tag=$(echo "${RELEASES}" | jq -r '.[0].tag')
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "::notice ::release_tag=${release_tag}"
  build:
    name: "Build ${{ matrix.target }}: ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    needs: release-plz-release
    if: ${{ needs.release-plz-release.outputs.releases_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    permissions:
      contents: write
    steps:
      - *checkout
      - name: Setup - Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
        with:
          target: ${{ matrix.target }}
      - name: Setup - Cross toolchain
        uses: taiki-e/setup-cross-toolchain-action@d62f33b587e73b0004731caebc7d2d46b18a7567 # v1.39.2
        with:
          target: ${{ matrix.target }}
      - name: Build
        run: cargo build --release
      - name: Output - Paths
        id: paths
        env:
          TARGET: ${{ matrix.target }}
        run: |
          suffix=''
          if [[ "${TARGET}" == *-pc-windows-* ]]; then
            suffix='.exe'
          fi
          src_path="./target/${TARGET}/release/${NAME}${suffix}"
          pkg_name="${NAME}-${TARGET}${suffix}"
          cp "${src_path}" "./${pkg_name}"
          echo "pkg_name=${pkg_name}" >> "${GITHUB_OUTPUT}"
      - name: GitHub - Upload release archive
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-plz-release.outputs.release_tag }}
        run: gh release upload "${RELEASE_TAG}" ${{ steps.paths.outputs.pkg_name }}
